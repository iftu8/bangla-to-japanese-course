<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokyo - Learn & Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 🌸 TOKYO SOCIAL THEME VARIABLES */
        :root {
            --bg-main: #fafafa;
            --bg-card: #ffffff;
            --text-main: #262626;
            --text-muted: #8e8e8e;
            --primary-accent: #e1306c; /* Instagram pink/red */
            --secondary-accent: #405de6;
            --border-color: #dbdbdb;
            --like-color: #ed4956;
            --font-logo: 'Dancing Script', cursive;
            --font-ui: 'Poppins', sans-serif;
            --font-jp: 'Noto Sans JP', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: var(--font-ui); 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 📱 MAIN LAYOUT */
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-card);
            min-height: 100vh;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            position: relative;
            padding-bottom: 70px; /* Space for bottom nav */
        }

        /* 🔝 HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: var(--font-logo);
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(45deg, var(--secondary-accent), var(--primary-accent), #fd1d1d, #f56040);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .header-icons i {
            font-size: 24px;
            margin-left: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .header-icons i:hover { color: var(--primary-accent); }

        /* 📖 STORIES BAR (CATEGORIES) */
        .stories-container {
            display: flex;
            gap: 15px;
            padding: 15px 20px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
            scrollbar-width: none; /* Firefox */
        }
        .stories-container::-webkit-scrollbar { display: none; } /* Chrome */

        .story {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            min-width: 70px;
        }
        .story-ring {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            padding: 3px;
            margin-bottom: 5px;
            transition: transform 0.2s;
        }
        .story-ring:hover { transform: scale(1.05); }
        .story-inner {
            width: 100%;
            height: 100%;
            background: var(--bg-card);
            border-radius: 50%;
            border: 2px solid var(--bg-card);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-jp);
            font-size: 24px;
            font-weight: 900;
            color: var(--text-main);
        }
        .story-name { font-size: 12px; font-weight: 600; color: var(--text-main); }

        /* 🖼️ POST FEED */
        .feed-section { padding-top: 10px; display: none; }
        .feed-section.active { display: block; animation: fadeIn 0.4s; }

        .post {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .post-header {
            display: flex;
            align-items: center;
            padding: 10px 15px;
        }
        .post-avatar {
            width: 35px; height: 35px; border-radius: 50%;
            background: var(--primary-accent); margin-right: 10px;
            display: flex; justify-content: center; align-items: center; color: #fff; font-weight: bold;
        }
        .post-user { font-weight: 600; font-size: 14px; }
        .post-location { font-size: 12px; color: var(--text-muted); }
        
        .post-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            background: #eee;
            cursor: pointer;
        }

        .post-actions {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            font-size: 24px;
        }
        .action-left { display: flex; gap: 15px; }
        .action-icon { cursor: pointer; transition: 0.2s; color: var(--text-main); }
        .action-icon.liked { color: var(--like-color); animation: heartPop 0.3s; }

        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .post-content { padding: 0 15px; }
        .post-likes { font-weight: 600; font-size: 14px; margin-bottom: 5px; }
        .post-caption { font-size: 14px; margin-bottom: 5px; }
        .jp-word { font-family: var(--font-jp); font-size: 22px; font-weight: bold; color: var(--primary-accent); }
        .post-time { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-top: 8px;}

        /* 🤖 DM / AI CHAT SECTION */
        .chat-section { display: none; height: calc(100vh - 130px); flex-direction: column; background: #fff;}
        .chat-section.active { display: flex; animation: fadeIn 0.4s; }
        .chat-header {
            padding: 15px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; gap: 10px;
        }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #fafafa;}
        .msg-bubble { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.4; }
        .msg-ai { background: #f1f0f0; color: #000; align-self: flex-start; border-bottom-left-radius: 5px; }
        .msg-user { background: var(--secondary-accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 5px; }
        
        .chat-input-area {
            padding: 15px; border-top: 1px solid var(--border-color); background: #fff;
            display: flex; gap: 10px; align-items: center;
        }
        .chat-input-area input {
            flex: 1; padding: 12px 20px; border: 1px solid var(--border-color);
            border-radius: 30px; outline: none; font-family: var(--font-ui); font-size: 14px;
        }
        .chat-input-area input:focus { border-color: var(--secondary-accent); }
        .btn-send {
            background: none; border: none; color: var(--secondary-accent);
            font-size: 20px; cursor: pointer; font-weight: bold; padding: 0 10px;
        }

        /* 🎯 QUIZ SECTION (POLL STYLE) */
        .quiz-section { display: none; padding: 20px; }
        .quiz-section.active { display: block; animation: fadeIn 0.4s; }
        .poll-card {
            background: #fff; border: 1px solid var(--border-color);
            border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px; text-align: center;
        }
        .poll-q { font-size: 40px; font-family: var(--font-jp); margin: 20px 0; color: var(--primary-accent); }
        .poll-options { display: flex; flex-direction: column; gap: 10px; }
        .poll-btn {
            padding: 15px; border: 1px solid var(--border-color); background: #fafafa;
            border-radius: 10px; font-family: var(--font-ui); font-weight: 600; cursor: pointer;
            transition: 0.2s; font-size: 16px;
        }
        .poll-btn:hover { background: #f0f0f0; }
        .poll-btn.correct { background: #4cd137; color: #fff; border-color: #4cd137; }
        .poll-btn.wrong { background: #e84118; color: #fff; border-color: #e84118; }

        /* ⬇️ BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 600px;
            background: var(--bg-card); border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around; align-items: center;
            padding: 15px 0; z-index: 1000;
        }
        .nav-item {
            font-size: 22px; color: var(--text-main); cursor: pointer; transition: 0.3s;
        }
        .nav-item.active { color: var(--primary-accent); transform: translateY(-3px); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Toast Alert */
        #toast {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            background: rgba(38, 38, 38, 0.9); color: #fff; padding: 12px 25px;
            border-radius: 30px; font-size: 14px; font-weight: 600;
            z-index: 9999; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(10px); }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo">Tokyo</div>
            <div class="header-icons">
                <i class="fa-regular fa-heart" onclick="showToast('No new notifications')"></i>
                <i class="fa-brands fa-facebook-messenger" onclick="switchTab('chat')"></i>
            </div>
        </header>

        <main id="tab-home" class="feed-section active">
            <div class="stories-container">
                <div class="story" onclick="showToast('Hiragana Module Coming Soon!')">
                    <div class="story-ring"><div class="story-inner">あ</div></div>
                    <span class="story-name">Hiragana</span>
                </div>
                <div class="story" onclick="showToast('Katakana Module Coming Soon!')">
                    <div class="story-ring"><div class="story-inner">ア</div></div>
                    <span class="story-name">Katakana</span>
                </div>
                <div class="story" onclick="showToast('Kanji Module Coming Soon!')">
                    <div class="story-ring"><div class="story-inner" style="color:var(--secondary-accent)">日</div></div>
                    <span class="story-name">Kanji N5</span>
                </div>
                <div class="story" onclick="switchTab('quiz')">
                    <div class="story-ring"><div class="story-inner" style="color:#4cd137">?</div></div>
                    <span class="story-name">Quizzes</span>
                </div>
            </div>

            <div id="feed-container">
                </div>
        </main>

        <main id="tab-chat" class="chat-section">
            <div class="chat-header">
                <div class="post-avatar" style="background:linear-gradient(45deg, #405de6, #833ab4);">AI</div>
                <div>
                    <div style="font-weight:600; font-size:16px;">Akira Sensei (AI)</div>
                    <div style="font-size:12px; color:#4cd137;">Online</div>
                </div>
            </div>
            <div class="chat-messages" id="chat-box">
                <div class="msg-bubble msg-ai">
                    Kon'nichiwa! 👋 I am your AI Sensei. Type any English or Bengali word, and I will translate it to Japanese for you using external APIs!
                </div>
            </div>
            <div class="chat-input-area">
                <i class="fa-solid fa-microphone btn-send" onclick="showToast('Voice typing requires HTTPS')"></i>
                <input type="text" id="ai-input" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="btn-send" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>

        <main id="tab-quiz" class="quiz-section">
            <div style="text-align:center; margin-bottom: 20px;">
                <h2 style="font-family: var(--font-logo); font-size:35px; color:var(--primary-accent);">Interactive Polls</h2>
                <p style="color:var(--text-muted); font-size:14px;">Test your knowledge in real-time</p>
            </div>
            <div id="quiz-container">
                </div>
        </main>

        <div class="bottom-nav">
            <i class="fa-solid fa-house nav-item active" onclick="switchTab('home')"></i>
            <i class="fa-solid fa-magnifying-glass nav-item" onclick="showToast('Search feature unlocked in Pro Max!')"></i>
            <i class="fa-solid fa-square-poll-vertical nav-item" onclick="switchTab('quiz')"></i>
            <i class="fa-brands fa-rocketchat nav-item" onclick="switchTab('chat')"></i>
            <i class="fa-regular fa-circle-user nav-item" onclick="showToast('Guest Profile (No Login Mode)')"></i>
        </div>
    </div>

    <div id="toast">Alert!</div>

    <script>
        // ==========================================
        // 📚 DYNAMIC DATABASE FOR FEED & QUIZ
        // ==========================================
        const postDatabase = [
            { id: 1, user: "japan_travels", loc: "Tokyo, Japan", jp: "桜", romaji: "Sakura", en: "Cherry Blossom", imgKey: "cherry blossom japan", likes: 1245 },
            { id: 2, user: "nihongo_daily", loc: "Kyoto", jp: "猫", romaji: "Neko", en: "Cat", imgKey: "cat japan", likes: 892 },
            { id: 3, user: "anime_world", loc: "Shibuya", jp: "友達", romaji: "Tomodachi", en: "Friend", imgKey: "friends tokyo", likes: 3042 },
            { id: 4, user: "foodie_jp", loc: "Osaka", jp: "美味しい", romaji: "Oishii", en: "Delicious", imgKey: "sushi ramen", likes: 4521 },
            { id: 5, user: "nature_jp", loc: "Mt. Fuji", jp: "山", romaji: "Yama", en: "Mountain", imgKey: "mount fuji", likes: 5612 }
        ];

        // ==========================================
        // 🚀 UI MANAGEMENT
        // ==========================================
        function switchTab(tabId) {
            // Hide all tabs
            document.querySelectorAll('main').forEach(el => el.classList.remove('active'));
            // Remove active class from nav icons
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            // Show target
            document.getElementById('tab-' + tabId).classList.add('active');
            
            // Highlight nav icon based on tab
            const icons = document.querySelectorAll('.nav-item');
            if(tabId === 'home') icons[0].classList.add('active');
            if(tabId === 'quiz') icons[2].classList.add('active');
            if(tabId === 'chat') icons[3].classList.add('active');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // ==========================================
        // 🖼️ FEED GENERATOR (WITH FAST IMAGES)
        // ==========================================
        function renderFeed() {
            const feed = document.getElementById('feed-container');
            feed.innerHTML = "";

            postDatabase.forEach(post => {
                // Using Unsplash Source API for fast, beautiful, theme-related photos
                const imgUrl = `https://source.unsplash.com/600x400/?${encodeURIComponent(post.imgKey)}`;
                
                const html = `
                <div class="post" id="post-${post.id}">
                    <div class="post-header">
                        <div class="post-avatar">${post.user.charAt(0).toUpperCase()}</div>
                        <div>
                            <div class="post-user">${post.user}</div>
                            <div class="post-location">${post.loc}</div>
                        </div>
                    </div>
                    
                    <img src="${imgUrl}" class="post-image" alt="${post.en}" ondblclick="toggleLike(${post.id})">
                    
                    <div class="post-actions">
                        <div class="action-left">
                            <i class="fa-regular fa-heart action-icon" id="like-icon-${post.id}" onclick="toggleLike(${post.id})"></i>
                            <i class="fa-regular fa-comment action-icon" onclick="showToast('Comments disabled in Guest Mode')"></i>
                            <i class="fa-regular fa-paper-plane action-icon" onclick="showToast('Shared!')"></i>
                        </div>
                        <i class="fa-solid fa-download action-icon" onclick="downloadImage('${imgUrl}', '${post.romaji}')" style="color:var(--secondary-accent)"></i>
                    </div>
                    
                    <div class="post-content">
                        <div class="post-likes"><span id="like-count-${post.id}">${post.likes.toLocaleString()}</span> likes</div>
                        <div class="post-caption">
                            <b>${post.user}</b> Learn a new word today! <br>
                            <span class="jp-word">${post.jp}</span> (${post.romaji}) - ${post.en}
                        </div>
                        <div class="post-time">${Math.floor(Math.random() * 23) + 1} HOURS AGO</div>
                    </div>
                </div>`;
                feed.innerHTML += html;
            });
        }

        // Like Toggle System
        let likedPosts = new Set();
        function toggleLike(id) {
            const icon = document.getElementById(`like-icon-${id}`);
            const countEl = document.getElementById(`like-count-${id}`);
            let currentCount = parseInt(countEl.innerText.replace(/,/g, ''));

            if(likedPosts.has(id)) {
                icon.classList.remove('fa-solid', 'liked');
                icon.classList.add('fa-regular');
                countEl.innerText = (currentCount - 1).toLocaleString();
                likedPosts.delete(id);
            } else {
                icon.classList.remove('fa-regular');
                icon.classList.add('fa-solid', 'liked');
                countEl.innerText = (currentCount + 1).toLocaleString();
                likedPosts.add(id);
                
                // Add pop animation
                icon.style.animation = 'none';
                setTimeout(() => icon.style.animation = 'heartPop 0.3s ease', 10);
            }
        }

        // Image Download System (Free & No Login)
        async function downloadImage(imageSrc, filename) {
            showToast("Downloading image...");
            try {
                const response = await fetch(imageSrc);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `TokyoApp_${filename}.jpg`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                showToast("Download Complete! ✅");
            } catch (err) {
                // Fallback for CORS blocks
                window.open(imageSrc, '_blank');
                showToast("Opened in new tab to save.");
            }
        }

        // ==========================================
        // 🤖 AI CHAT SYSTEM (MyMemory API)
        // ==========================================
        async function sendMessage() {
            const input = document.getElementById('ai-input');
            const text = input.value.trim();
            if(!text) return;

            // User Message
            appendMessage(text, 'user');
            input.value = "";
            
            // AI Loading state
            const loadId = 'msg-' + Date.now();
            appendMessage('<i class="fa-solid fa-ellipsis" style="animation: pulse 1s infinite;"></i> Typing...', 'ai', loadId);

            try {
                // Determine source lang pair (Bengali or English to Japanese)
                const isBengali = /[\u0980-\u09FF]/.test(text);
                const langpair = isBengali ? 'bn|ja' : 'en|ja';
                
                // Fetch translation from free external API
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langpair}`;
                const res = await fetch(url);
                const data = await res.json();
                
                document.getElementById(loadId).remove();

                if(data && data.responseData && data.responseData.translatedText) {
                    const reply = `
                        <span style="font-family:var(--font-jp); font-size:20px; color:var(--primary-accent); display:block; margin-bottom:5px;">
                            ${data.responseData.translatedText}
                        </span>
                        <small style="color:#666;">(Translated via Cloud API)</small>
                    `;
                    appendMessage(reply, 'ai');
                } else {
                    throw new Error("API Limit");
                }
            } catch(e) {
                document.getElementById(loadId).remove();
                appendMessage("Sorry, the network is busy. Try a simpler word.", 'ai');
            }
        }

        function appendMessage(html, type, id = null) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg-bubble msg-${type}`;
            if(id) div.id = id;
            div.innerHTML = html;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // ==========================================
        // 🎯 QUIZ POLL ENGINE
        // ==========================================
        const quizData = [
            { q: "水", ans: "Water", options: ["Fire", "Tree", "Water", "Gold"] },
            { q: "こんにちは", ans: "Hello", options: ["Goodbye", "Hello", "Sorry", "Thanks"] },
            { q: "車", ans: "Car", options: ["Train", "Car", "Bicycle", "Bus"] }
        ];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = "";

            quizData.forEach((item, index) => {
                let optionsHtml = '';
                // Shuffle options
                let shuffled = [...item.options].sort(() => Math.random() - 0.5);
                
                shuffled.forEach(opt => {
                    optionsHtml += `<button class="poll-btn" onclick="checkPoll(this, '${opt}', '${item.ans}', ${index})">${opt}</button>`;
                });

                container.innerHTML += `
                    <div class="poll-card" id="poll-${index}">
                        <div style="font-size:12px; font-weight:bold; color:var(--text-muted); text-transform:uppercase;">Poll ${index + 1}</div>
                        <div class="poll-q">${item.q}</div>
                        <div class="poll-options" id="options-${index}">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
            });
        }

        function checkPoll(btn, selected, correct, pollIndex) {
            const container = document.getElementById(`options-${pollIndex}`);
            const buttons = container.querySelectorAll('.poll-btn');
            
            // Disable all buttons in this poll
            buttons.forEach(b => b.style.pointerEvents = 'none');

            if(selected === correct) {
                btn.classList.add('correct');
                showToast("Correct! +10 Points 🌟");
            } else {
                btn.classList.add('wrong');
                // Highlight the correct one
                buttons.forEach(b => {
                    if(b.innerText === correct) b.classList.add('correct');
                });
                showToast("Oops! Incorrect. ❌");
            }
        }

        // ==========================================
        // 🚀 INITIALIZATION
        // ==========================================
        window.onload = () => {
            renderFeed();
            renderQuiz();
        };
    </script>
</body>
</html>
